<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartBudget+ | Presupuesto</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    />
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>

<body class="bg-sb-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-semibold text-sb-dark" href="../index.html">
                <span class="badge rounded-pill text-bg-success me-2">SB+</span>
                SmartBudget+
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Menú">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto gap-2 align-items-lg-center" data-nav-list></ul>
                <div class="ms-lg-4 mt-3 mt-lg-0" data-user-badge></div>
            </div>
        </div>
    </nav>

    <main class="pt-5 mt-5">
        <section class="py-4">
            <div class="container">
                <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
                    <div>
                        <h1 class="h3 fw-semibold text-sb-dark mb-1">Gestiona tu presupuesto</h1>
                        <p class="text-secondary mb-0" id="budgetSubheading">Define un presupuesto mensual para controlar tus gastos.</p>
                    </div>
                    <div class="d-flex gap-2">
                        <a href="dashboard.html" class="btn btn-outline-success">Volver al panel</a>
                        <a href="expenses.html" class="btn btn-success">Registrar gastos</a>
                    </div>
                </div>

                <div id="alertContainer"></div>

                <div class="row g-4">
                    <div class="col-lg-5">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body">
                                <h5 class="text-sb-dark mb-3">Presupuesto actual</h5>
                                <dl class="row small mb-0" id="currentBudgetDetails">
                                    <dt class="col-5 text-secondary">Estado</dt>
                                    <dd class="col-7 text-sb-dark">Sin presupuesto activo</dd>
                                </dl>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-7">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body">
                                <h5 class="text-sb-dark mb-3">Crear o actualizar presupuesto</h5>
                                <form id="budgetForm" class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label text-secondary" for="amount">Monto mensual</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light text-secondary">S/</span>
                                            <input type="number" min="0" step="0.01" class="form-control" id="amount" required />
                                        </div>
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label text-secondary" for="month">Mes</label>
                                        <input type="number" min="1" max="12" class="form-control" id="month" placeholder="10" />
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label text-secondary" for="year">Año</label>
                                        <input type="number" min="2024" class="form-control" id="year" placeholder="2025" />
                                    </div>
                                    <div class="col-md-8">
                                        <label class="form-label text-secondary" for="name">Nombre</label>
                                        <input type="text" class="form-control" id="name" placeholder="Presupuesto Octubre 2025" />
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label text-secondary" for="alert_threshold">Alerta (%)</label>
                                        <input type="number" min="0" max="1" step="0.05" class="form-control" id="alert_threshold" placeholder="0.25" />
                                        <small class="text-secondary">Ej: 0.25 = alerta al 25%</small>
                                    </div>
                                    <div class="col-12">
                                        <button class="btn btn-success w-100">Guardar presupuesto</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
    <script src="../assets/js/core.js"></script>
    <script src="../assets/js/budgets.js"></script>
</body>

</html>
