<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartBudget+ | Iniciar sesión</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    />
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>

<body class="bg-sb-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-semibold text-sb-dark" href="../index.html">
                <span class="badge rounded-pill text-bg-success me-2">SB+</span>
                SmartBudget+
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Menú">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto gap-2 align-items-lg-center" data-nav-list></ul>
                <div class="ms-lg-4 mt-3 mt-lg-0" data-user-badge></div>
            </div>
        </div>
    </nav>

    <main class="pt-5 mt-5">
        <section class="py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-5">
                        <div class="card shadow border-0">
                            <div class="card-body p-4 p-lg-5">
                                <h1 class="h3 fw-semibold text-sb-dark mb-3 text-center">Bienvenido de nuevo</h1>
                                <p class="text-secondary text-center mb-4">
                                    Ingresa tus credenciales para acceder a tu panel financiero.
                                </p>
                                <div id="alertContainer"></div>
                                <form id="loginForm" class="vstack gap-3">
                                    <div>
                                        <label for="email" class="form-label text-secondary">Correo electrónico</label>
                                        <input type="email" class="form-control" id="email" required placeholder="tucorreo@ejemplo.com" />
                                    </div>
                                    <div>
                                        <label for="password" class="form-label text-secondary">Contraseña</label>
                                        <input type="password" class="form-control" id="password" required placeholder="••••••••" />
                                    </div>
                                    <button type="submit" class="btn btn-success w-100">Iniciar sesión</button>
                                </form>
                                <p class="text-center text-secondary small mt-4 mb-0">
                                    ¿Aún no tienes cuenta?
                                    <a href="register.html" class="text-decoration-none text-success">Regístrate aquí</a>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
    <script src="../assets/js/core.js"></script>
    <script src="../assets/js/login.js"></script>
</body>

</html>
