<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartBudget+ | Perfil</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    />
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>

<body class="bg-sb-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-semibold text-sb-dark" href="../index.html">
                <span class="badge rounded-pill text-bg-success me-2">SB+</span>
                SmartBudget+
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Menú">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto gap-2 align-items-lg-center" data-nav-list></ul>
                <div class="ms-lg-4 mt-3 mt-lg-0" data-user-badge></div>
            </div>
        </div>
    </nav>

    <main class="pt-5 mt-5">
        <section class="py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-6">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body p-4">
                                <h1 class="h4 text-sb-dark fw-semibold mb-3">Perfil de usuario</h1>
                                <p class="text-secondary mb-4">
                                    Consulta tu información registrada y verifica los valores predeterminados para tus cálculos.
                                </p>
                                <dl class="row mb-0" id="profileDetails">
                                    <dt class="col-5 text-secondary">Nombre</dt>
                                    <dd class="col-7 text-sb-dark">-</dd>
                                    <dt class="col-5 text-secondary">Correo</dt>
                                    <dd class="col-7 text-sb-dark">-</dd>
                                    <dt class="col-5 text-secondary">Moneda</dt>
                                    <dd class="col-7 text-sb-dark">-</dd>
                                    <dt class="col-5 text-secondary">Ingreso mensual</dt>
                                    <dd class="col-7 text-sb-dark">-</dd>
                                    <dt class="col-5 text-secondary">Estado</dt>
                                    <dd class="col-7 text-success fw-semibold">Activo</dd>
                                </dl>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
    <script src="../assets/js/core.js"></script>
    <script src="../assets/js/profile.js"></script>
</body>

</html>
